<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรายงานค่าคอมมิชชั่น</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .modal-active { overflow: hidden; }
    </style>
</head>
<body class="text-gray-800">

    <!-- Navbar -->
    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-semibold"><i class="fas fa-file-invoice-dollar mr-2"></i> ระบบรายงานค่าคอมมิชชั่น</h1>
            <button onclick="loadData()" class="bg-blue-500 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm transition-colors flex items-center">
                <i class="fas fa-sync-alt mr-2" id="refresh-icon"></i> รีเฟรชข้อมูล
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <!-- Search and Filter -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-col sm:flex-row gap-4">
            <div class="flex-1">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="ค้นหาชื่อ, รหัสพนักงาน หรือเดือน..." class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="text-center py-10 hidden">
            <i class="fas fa-spinner fa-spin text-4xl text-blue-500 mb-3"></i>
            <p class="text-gray-500">กำลังโหลดข้อมูลจากระบบ...</p>
        </div>

        <!-- Data Table (Desktop & Tablet) / Cards (Mobile) -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden hidden md:block">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b">
                        <th class="py-4 px-6 font-medium text-gray-600">รหัสพนักงาน</th>
                        <th class="py-4 px-6 font-medium text-gray-600">ชื่อ-นามสกุล</th>
                        <th class="py-4 px-6 font-medium text-gray-600">เดือน/ปี</th>
                        <th class="py-4 px-6 font-medium text-gray-600 text-right">ยอดคอมมิชชั่น</th>
                        <th class="py-4 px-6 font-medium text-gray-600 text-center">จัดการไฟล์ PDF</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>

        <!-- Mobile Card View -->
        <div id="mobileDataContainer" class="md:hidden space-y-4">
            <!-- Data will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-16 hidden bg-white rounded-xl shadow-sm">
            <div class="text-gray-300 mb-4"><i class="fas fa-folder-open text-6xl"></i></div>
            <h3 class="text-lg font-medium text-gray-700">ไม่พบข้อมูล</h3>
            <p class="text-gray-500 mt-1">ยังไม่มีข้อมูลรายงานค่าคอมมิชชั่นในขณะนี้</p>
        </div>

    </main>

    <!-- PDF Preview Modal -->
    <div id="pdfModal" class="fixed inset-0 z-50 hidden bg-black bg-opacity-75 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-xl w-full max-w-4xl h-[85vh] flex flex-col overflow-hidden shadow-2xl relative">
            
            <!-- Modal Header -->
            <div class="flex justify-between items-center px-6 py-4 border-b bg-gray-50">
                <h3 class="text-lg font-semibold text-gray-800" id="modalTitle">พรีวิวเอกสาร</h3>
                <div class="flex gap-2">
                    <a id="modalDownloadBtn" href="#" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm transition-colors flex items-center">
                        <i class="fas fa-download mr-1"></i> โหลด
                    </a>
                    <button onclick="closeModal()" class="text-gray-500 hover:text-red-500 transition-colors p-2">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
            </div>
            
            <!-- Modal Body (Iframe) -->
            <div class="flex-1 bg-gray-100 relative">
                <div id="modalLoading" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-100 z-10">
                    <i class="fas fa-spinner fa-spin text-4xl text-blue-500 mb-3"></i>
                    <p>กำลังโหลดเอกสาร PDF...</p>
                </div>
                <iframe id="pdfIframe" class="w-full h-full border-0" onload="document.getElementById('modalLoading').style.display='none'"></iframe>
            </div>
        </div>
    </div>

    <script>
        let globalData = [];

        // Mock data for display in this environment (Canvas)
        const mockData = [
            { "EmpID": "EMP-001", "Name": "สมชาย ใจดี", "Month": "มกราคม 2026", "Amount": "15,000", "PDF_Link": "https://drive.google.com/file/d/1X9b0O5n8Z2y_EXAMPLE_ID/view" },
            { "EmpID": "EMP-002", "Name": "สมหญิง รักงาน", "Month": "มกราคม 2026", "Amount": "22,500", "PDF_Link": "https://drive.google.com/file/d/1X9b0O5n8Z2y_EXAMPLE_ID/view" },
            { "EmpID": "EMP-003", "Name": "วิชัย เก่งกล้า", "Month": "มกราคม 2026", "Amount": "8,200", "PDF_Link": "https://drive.google.com/file/d/1X9b0O5n8Z2y_EXAMPLE_ID/view" },
            { "EmpID": "EMP-001", "Name": "สมชาย ใจดี", "Month": "กุมภาพันธ์ 2026", "Amount": "18,400", "PDF_Link": "https://drive.google.com/file/d/1X9b0O5n8Z2y_EXAMPLE_ID/view" }
        ];

        // Utility to extract Drive File ID and generate correct links
        function processDriveLink(url) {
            if (!url) return { preview: '', download: '' };
            // Extract ID using regex
            const match = url.match(/[-\w]{25,}/);
            if (match) {
                const fileId = match[0];
                return {
                    preview: `https://drive.google.com/file/d/${fileId}/preview`,
                    download: `https://drive.google.com/uc?export=download&id=${fileId}`
                };
            }
            return { preview: url, download: url }; // Fallback
        }

        // Load data from Google Apps Script
        function loadData() {
            showLoading(true);
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('fa-spin');

            // Check if running in Google Apps Script environment
            if (typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler(function(data) {
                        globalData = data;
                        renderData(globalData);
                        showLoading(false);
                        icon.classList.remove('fa-spin');
                    })
                    .withFailureHandler(function(error) {
                        console.error(error);
                        showLoading(false);
                        icon.classList.remove('fa-spin');
                        // Show error message (replacing alert)
                        const emptyState = document.getElementById('emptyState');
                        emptyState.innerHTML = `<div class="text-red-500 mb-4"><i class="fas fa-exclamation-triangle text-6xl"></i></div><h3 class="text-lg font-medium text-gray-700">เกิดข้อผิดพลาด</h3><p class="text-gray-500 mt-1">ไม่สามารถดึงข้อมูลได้ กรุณาลองใหม่อีกครั้ง</p>`;
                        emptyState.classList.remove('hidden');
                    })
                    .getCommissionData();
            } else {
                // Fallback for canvas preview
                setTimeout(() => {
                    globalData = mockData;
                    renderData(globalData);
                    showLoading(false);
                    icon.classList.remove('fa-spin');
                }, 800);
            }
        }

        function showLoading(isLoading) {
            document.getElementById('loading').style.display = isLoading ? 'block' : 'none';
            document.getElementById('dataTableBody').innerHTML = '';
            document.getElementById('mobileDataContainer').innerHTML = '';
            document.getElementById('emptyState').classList.add('hidden');
        }

        function renderData(data) {
            const tbody = document.getElementById('dataTableBody');
            const mobileContainer = document.getElementById('mobileDataContainer');
            
            tbody.innerHTML = '';
            mobileContainer.innerHTML = '';

            if (data.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                document.querySelector('table').parentElement.classList.add('hidden');
                return;
            }

            document.getElementById('emptyState').classList.add('hidden');
            document.querySelector('table').parentElement.classList.remove('hidden');

            data.forEach((row, index) => {
                const links = processDriveLink(row.PDF_Link || '');
                const hasPdf = row.PDF_Link && row.PDF_Link.trim() !== '';

                const actionButtons = hasPdf ? `
                    <div class="flex items-center justify-center gap-2">
                        <button onclick="openPreview('${links.preview}', '${row.Name} - ${row.Month}', '${links.download}')" class="bg-blue-100 text-blue-600 hover:bg-blue-200 px-3 py-1.5 rounded-lg text-sm transition-colors">
                            <i class="fas fa-eye"></i> พรีวิว
                        </button>
                        <a href="${links.download}" target="_blank" class="bg-green-100 text-green-600 hover:bg-green-200 px-3 py-1.5 rounded-lg text-sm transition-colors">
                            <i class="fas fa-download"></i> โหลด
                        </a>
                    </div>
                ` : `<span class="text-gray-400 text-sm">ไม่มีไฟล์</span>`;

                // Desktop Row
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-blue-50 transition-colors";
                tr.innerHTML = `
                    <td class="py-3 px-6 text-gray-700">${row.EmpID || '-'}</td>
                    <td class="py-3 px-6 font-medium text-gray-800">${row.Name || '-'}</td>
                    <td class="py-3 px-6 text-gray-600">${row.Month || '-'}</td>
                    <td class="py-3 px-6 text-right font-semibold text-blue-600">฿${row.Amount || '0'}</td>
                    <td class="py-3 px-6">${actionButtons}</td>
                `;
                tbody.appendChild(tr);

                // Mobile Card
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-xs font-semibold bg-gray-100 text-gray-600 px-2 py-1 rounded-md">${row.EmpID || '-'}</span>
                            <h3 class="font-medium text-gray-800 mt-2">${row.Name || '-'}</h3>
                        </div>
                        <div class="text-right">
                            <span class="text-xs text-gray-500">${row.Month || '-'}</span>
                            <div class="font-semibold text-blue-600 mt-1">฿${row.Amount || '0'}</div>
                        </div>
                    </div>
                    <div class="mt-4 pt-3 border-t border-gray-50">
                        ${actionButtons.replace('justify-center', 'justify-start')}
                    </div>
                `;
                mobileContainer.appendChild(card);
            });
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = globalData.filter(row => {
                return (
                    (row.Name && row.Name.toLowerCase().includes(query)) ||
                    (row.EmpID && row.EmpID.toLowerCase().includes(query)) ||
                    (row.Month && row.Month.toLowerCase().includes(query))
                );
            });
            renderData(filtered);
        }

        // Modal Functions
        function openPreview(previewUrl, title, downloadUrl) {
            document.getElementById('modalTitle').innerText = title || 'พรีวิวเอกสาร';
            document.getElementById('modalDownloadBtn').href = downloadUrl;
            document.getElementById('pdfIframe').src = previewUrl;
            
            const modal = document.getElementById('pdfModal');
            document.body.classList.add('modal-active');
            modal.classList.remove('hidden');
            document.getElementById('modalLoading').style.display = 'flex'; // Show iframe loading
        }

        function closeModal() {
            const modal = document.getElementById('pdfModal');
            document.body.classList.remove('modal-active');
            modal.classList.add('hidden');
            document.getElementById('pdfIframe').src = ''; // Clear iframe to stop audio/video if any
        }

        // Close modal on outside click
        document.getElementById('pdfModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initial Load
        window.onload = loadData;

    </script>
</body>
</html>
