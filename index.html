<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรายงานค่าคอมมิชชั่น กราฟฟิก มาร์เก็ตติ้ง เชิญตวรรณ พิศเพ็ง</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f9fafb; }
        .modal-active { overflow: hidden; }
        /* ซ่อนส่วนแสดงผลข้อมูลไว้ก่อนจนกว่าจะโหลดเสร็จ */
        #dataWrapper { display: none; }
    </style>
</head>
<body class="text-gray-800 flex flex-col min-h-screen selection:bg-gray-200 selection:text-gray-900">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-lg font-medium text-gray-800 tracking-wide">
                <i class="fas fa-chart-line text-gray-400 mr-2"></i> 
                ระบบรายงานค่าคอมมิชชั่น กราฟฟิก มาร์เก็ตติ้ง เชิญตวรรณ พิศเพ็ง
            </h1>
            <button onclick="loadData()" class="bg-gray-800 hover:bg-black text-white px-5 py-2 rounded text-sm transition-colors flex items-center">
                <i class="fas fa-sync-alt mr-2" id="refresh-icon"></i> รีเฟรช
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8 flex-1 w-full">
        
        <!-- Search and Filter -->
        <div class="mb-6 flex flex-col sm:flex-row gap-4">
            <div class="flex-1">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" id="searchInput" onkeyup="filterData()" placeholder="ค้นหาจากเดือน/ปี..." class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded bg-white text-gray-700 placeholder-gray-400 focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 transition-shadow">
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="text-center py-12 bg-white rounded border border-gray-100">
            <i class="fas fa-circle-notch fa-spin text-3xl text-gray-300 mb-3"></i>
            <p class="text-gray-500 text-sm tracking-wide">กำลังโหลดข้อมูล...</p>
        </div>

        <div id="dataWrapper">
            <!-- Data Table (Desktop & Tablet) -->
            <div class="bg-white rounded border border-gray-200 overflow-hidden hidden md:block mb-4">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <th class="py-4 px-6 font-medium text-sm text-gray-500 uppercase tracking-wider">เดือน/ปี</th>
                            <th class="py-4 px-6 font-medium text-sm text-gray-500 uppercase tracking-wider text-center">จัดการไฟล์ PDF</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="divide-y divide-gray-100">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>

            <!-- Mobile Card View -->
            <div id="mobileDataContainer" class="md:hidden space-y-3">
                <!-- Data will be injected here -->
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-16 hidden bg-white rounded border border-gray-100">
            <div class="text-gray-200 mb-3"><i class="fas fa-inbox text-5xl"></i></div>
            <h3 class="text-base font-medium text-gray-800">ไม่พบข้อมูล</h3>
            <p class="text-gray-500 mt-1 text-sm">ยังไม่มีรายงานในระบบ</p>
        </div>

        <!-- Debug Info -->
        <div id="debugInfo" class="text-xs text-gray-400 mt-8 text-center font-mono">
            สถานะ: กำลังรอโหลดข้อมูล...
        </div>

    </main>

    <!-- PDF Preview Modal -->
    <div id="pdfModal" class="fixed inset-0 z-50 hidden bg-gray-900/40 backdrop-blur-sm flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-lg w-full max-w-4xl h-[85vh] flex flex-col overflow-hidden shadow-xl relative border border-gray-200">
            
            <!-- Modal Header -->
            <div class="flex justify-between items-center px-6 py-4 border-b border-gray-100 bg-white">
                <h3 class="text-base font-medium text-gray-800" id="modalTitle">พรีวิวเอกสาร</h3>
                <div class="flex gap-2">
                    <a id="modalDownloadBtn" href="#" class="bg-gray-800 hover:bg-black text-white px-4 py-2 rounded text-sm transition-colors flex items-center">
                        <i class="fas fa-download mr-1.5"></i> โหลด
                    </a>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors p-2 rounded hover:bg-gray-50">
                        <i class="fas fa-times text-lg"></i>
                    </button>
                </div>
            </div>
            
            <!-- Modal Body (Iframe) -->
            <div class="flex-1 bg-gray-50 relative">
                <div id="modalLoading" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-50 z-10">
                    <i class="fas fa-circle-notch fa-spin text-3xl text-gray-300 mb-3"></i>
                    <p class="text-gray-500 text-sm">กำลังโหลดเอกสาร PDF...</p>
                </div>
                <iframe id="pdfIframe" class="w-full h-full border-0" onload="document.getElementById('modalLoading').style.display='none'"></iframe>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. URL Web App ของ Google Apps Script ของคุณ
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbxKhANveyUapSx0DxuProGEpShkTUQlemmtr2r8mMTNCzI6kO2qMi88LUdNdm8jrZ1m/exec"; 

        let globalData = [];

        // Utility to extract Drive File ID and generate correct links
        function processDriveLink(url) {
            if (!url) return { preview: '', download: '' };
            const match = url.match(/[-\w]{25,}/);
            if (match) {
                const fileId = match[0];
                return {
                    preview: `https://drive.google.com/file/d/${fileId}/preview`,
                    download: `https://drive.google.com/uc?export=download&id=${fileId}`
                };
            }
            return { preview: url, download: url };
        }

        // Load data using Fetch API
        async function loadData() {
            try {
                document.getElementById('debugInfo').innerText = "สถานะ: กำลังเริ่มต้นระบบ...";
                
                showLoading(true);
                const icon = document.getElementById('refresh-icon');
                if (icon) icon.classList.add('fa-spin');
                
                document.getElementById('debugInfo').innerText = "สถานะ: กำลังติดต่อฐานข้อมูล...";

                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                const result = await response.json();
                if (result.status === 'error') throw new Error(result.message || 'เกิดข้อผิดพลาดจากเซิร์ฟเวอร์');

                const data = result.data || [];
                document.getElementById('debugInfo').innerText = `สถานะ: ข้อมูลอัปเดตล่าสุด - พบ ${data.length} รายการ`;
                
                globalData = data;
                renderData(globalData);
                
                showLoading(false);
                if (icon) icon.classList.remove('fa-spin');

            } catch (error) {
                console.error("Fetch error:", error);
                const icon = document.getElementById('refresh-icon');
                if (icon) icon.classList.remove('fa-spin');
                document.getElementById('debugInfo').innerText = `สถานะ: ผิดพลาด - ${error.message}`;
                showErrorState(error.message || 'ไม่สามารถดึงข้อมูลได้');
            }
        }

        function showLoading(isLoading) {
            const loadingEl = document.getElementById('loading');
            const dataWrapper = document.getElementById('dataWrapper');
            const emptyState = document.getElementById('emptyState');

            if (isLoading) {
                loadingEl.style.display = 'block';
                dataWrapper.style.display = 'none';
                emptyState.classList.add('hidden');
            } else {
                loadingEl.style.display = 'none';
            }
        }

        function showErrorState(msg) {
            showLoading(false);
            const emptyState = document.getElementById('emptyState');
            emptyState.innerHTML = `<div class="text-gray-300 mb-3"><i class="fas fa-exclamation-circle text-5xl"></i></div><h3 class="text-base font-medium text-gray-800">เกิดข้อผิดพลาด</h3><p class="text-gray-500 mt-1 text-sm">${msg}</p>`;
            emptyState.classList.remove('hidden');
        }

        function renderData(data) {
            const tbody = document.getElementById('dataTableBody');
            const mobileContainer = document.getElementById('mobileDataContainer');
            const dataWrapper = document.getElementById('dataWrapper');
            const emptyState = document.getElementById('emptyState');
            
            // Clear existing
            tbody.innerHTML = '';
            mobileContainer.innerHTML = '';

            // Guard against null/empty
            if (!data || data.length === 0) {
                emptyState.classList.remove('hidden');
                dataWrapper.style.display = 'none';
                return;
            }

            // Show table
            emptyState.classList.add('hidden');
            dataWrapper.style.display = 'block';

            data.forEach((row, index) => {
                const links = processDriveLink(row.PDF_Link || '');
                const hasPdf = row.PDF_Link && row.PDF_Link.trim() !== '';

                const actionButtons = hasPdf ? `
                    <div class="flex items-center justify-center gap-2">
                        <button onclick="openPreview('${links.preview}', 'รายงาน - ${row.Month}', '${links.download}')" class="bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 px-4 py-1.5 rounded text-sm transition-all shadow-sm">
                            <i class="fas fa-eye mr-1.5"></i> พรีวิว
                        </button>
                        <a href="${links.download}" target="_blank" class="bg-gray-800 border border-gray-800 text-white hover:bg-black hover:border-black px-4 py-1.5 rounded text-sm transition-all shadow-sm">
                            <i class="fas fa-download mr-1.5"></i> โหลด
                        </a>
                    </div>
                ` : `<span class="text-gray-400 text-sm italic">ไม่มีไฟล์แนบ</span>`;

                // Desktop Row
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50/50 transition-colors";
                tr.innerHTML = `
                    <td class="py-4 px-6 text-gray-800">${row.Month || '-'}</td>
                    <td class="py-4 px-6">${actionButtons}</td>
                `;
                tbody.appendChild(tr);

                // Mobile Card
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded border border-gray-200 shadow-sm";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <div>
                            <h3 class="font-medium text-gray-800">${row.Month || '-'}</h3>
                        </div>
                    </div>
                    <div class="pt-4 border-t border-gray-100 flex justify-start">
                        ${actionButtons.replace('justify-center', 'justify-start')}
                    </div>
                `;
                mobileContainer.appendChild(card);
            });
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = globalData.filter(row => {
                return (row.Month && row.Month.toLowerCase().includes(query));
            });
            renderData(filtered);
        }

        // Modal Functions
        function openPreview(previewUrl, title, downloadUrl) {
            document.getElementById('modalTitle').innerText = title || 'พรีวิวเอกสาร';
            document.getElementById('modalDownloadBtn').href = downloadUrl;
            document.getElementById('pdfIframe').src = previewUrl;
            
            const modal = document.getElementById('pdfModal');
            document.body.classList.add('modal-active');
            modal.classList.remove('hidden');
            document.getElementById('modalLoading').style.display = 'flex'; 
        }

        function closeModal() {
            const modal = document.getElementById('pdfModal');
            document.body.classList.remove('modal-active');
            modal.classList.add('hidden');
            document.getElementById('pdfIframe').src = ''; 
        }

        // Close modal on outside click
        document.getElementById('pdfModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initialize App
        document.addEventListener("DOMContentLoaded", loadData);

    </script>
</body>
</html>
